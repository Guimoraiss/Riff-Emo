<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Riff Emo reúne uma curadoria fictícia de roupas oficiais de bandas alternativas, emo, metal e indie com foco em estilo, usabilidade e lojas oficiais."
    />
    <meta name="robots" content="index, follow" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Riff Emo - Merch oficial de bandas" />
    <meta
      property="og:description"
      content="Curadoria de apparel oficial de bandas, com peças escolhidas pelo visual e pela origem oficial."
    />
    <meta property="og:image" content="https://cdn.shopify.com/s/files/1/0652/6491/0583/products/AMO016A-HOBLK-FRONT.png?v=1660289021" />
    <title>Riff Emo - Merch oficial de bandas</title>
    <link rel="canonical" href="./" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%23151412'/%3E%3Ctext x='8' y='39' fill='%23fbfaf6' font-family='Arial, sans-serif' font-size='18' font-weight='700'%3ERE%3C/text%3E%3C/svg%3E" />
    <link rel="preconnect" href="https://cdn.shopify.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="#home" aria-label="Riff Emo home">
        <span>RIFF</span>
        <span>EMO</span>
      </a>

      <nav class="main-nav" aria-label="Menu principal">
        <a href="#home">Início</a>
        <div class="nav-group">
          <button class="nav-trigger" type="button" aria-expanded="false" aria-controls="bandMenu">Bandas</button>
          <div class="band-menu" id="bandMenu"></div>
        </div>
        <a href="#new">Novidades</a>
      </nav>

      <div class="header-actions">
        <button class="theme-toggle" type="button" aria-label="Ativar tema escuro" aria-pressed="false">
          <span class="theme-toggle__icon" aria-hidden="true"></span>
          <span class="theme-toggle__text">Escuro</span>
        </button>
        <button class="cart-button" type="button" aria-label="Sacola com 0 itens">
          <span>Sacola</span>
          <strong aria-hidden="true">0</strong>
        </button>
      </div>
    </header>

    <nav class="bottom-nav" aria-label="Menu mobile">
      <a class="bottom-nav__item" href="#home" data-mobile-nav="home" aria-label="Ir para o início">
        <svg aria-hidden="true" viewBox="0 0 24 24">
          <path d="M3 10.5 12 3l9 7.5v9a1.5 1.5 0 0 1-1.5 1.5h-4.2v-6.2H8.7V21H4.5A1.5 1.5 0 0 1 3 19.5v-9Z" />
        </svg>
        <span>Início</span>
      </a>
      <a class="bottom-nav__item" href="#bands" data-mobile-nav="bands" aria-label="Ver bandas">
        <svg aria-hidden="true" viewBox="0 0 24 24">
          <path d="M7.2 4.2v15.6M16.8 4.2v15.6M4 7.4h16M4 16.6h16" />
          <path d="M9.5 12a2.5 2.5 0 1 0 5 0 2.5 2.5 0 0 0-5 0Z" />
        </svg>
        <span>Bandas</span>
      </a>
      <a class="bottom-nav__item" href="#new" data-mobile-nav="new" aria-label="Ver novidades">
        <svg aria-hidden="true" viewBox="0 0 24 24">
          <path d="m12 3 2.1 5.4 5.7.4-4.4 3.7 1.4 5.6L12 15.1l-4.8 3 1.4-5.6-4.4-3.7 5.7-.4L12 3Z" />
        </svg>
        <span>Novidades</span>
      </a>
      <button class="bottom-nav__item bottom-nav__cart" type="button" data-mobile-cart aria-label="Abrir sacola com 0 itens">
        <svg aria-hidden="true" viewBox="0 0 24 24">
          <path d="M6.8 8.5h10.4l-.8 11H7.6l-.8-11Z" />
          <path d="M9 8.5a3 3 0 0 1 6 0" />
        </svg>
        <span>Sacola</span>
        <strong aria-hidden="true">0</strong>
      </button>
    </nav>
    <template id="homeContent">
     
      <span data-field="title">Merch oficial com alma indie.</span>
      <span data-field="lead">Roupas de bandas escolhidas pelo visual, pela usabilidade e pela origem oficial. Menos souvenir, mais peça de guarda-roupa.</span>
      
      
    </template>

    <template id="collectionsContent">
      <span data-field="eyebrow">Bandas</span>
      <span data-field="title">Aqui na Riff Emo, você encontra as melhores camisetas de bandas</span>
      <span data-field="deftonesLabel">Deftones / frio minimalista</span>
      <span data-field="paramoreLabel">Paramore / jaqueta de capa</span>
      <span data-field="radioheadLabel">Radiohead / arte conceitual</span>
    </template>

    <main id="app"></main>

    <div class="cart-overlay" data-cart-close hidden></div>
    <aside class="cart-drawer" id="cartDrawer" role="dialog" aria-label="Sacola" aria-modal="true" aria-hidden="true">
      <div class="cart-drawer__header">
        <div>
          <p class="eyebrow">Sacola</p>
          <h2>Itens escolhidos</h2>
        </div>
        <button class="cart-drawer__close" type="button" data-cart-close aria-label="Fechar sacola">×</button>
      </div>
      <div class="cart-drawer__items" id="cartItems"></div>
      <div class="cart-drawer__footer">
        <div class="cart-total">
          <span>Total</span>
          <strong id="cartTotal">R$ 0,00</strong>
        </div>
        <button class="btn cart-checkout" type="button">Finalizar Compra</button>
      </div>
    </aside>

    <footer class="site-footer">
      <div>
        <strong>Riff Emo</strong>
      </div>
      <nav class="footer-links" aria-label="Links do rodapé">
        <a href="#home">Home</a>
      </nav>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
